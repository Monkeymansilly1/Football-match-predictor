<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Predictor</title>
    <style>
        body {
            background-color: #0b0f1a;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .button {
            background-color: #00c3ff;
            color: #0b0f1a;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .button:hover {
            background-color: #009bb5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Premier League Predictor</h1>
        <input type="text" id="team1" placeholder="Enter Team 1" />
        <input type="text" id="team2" placeholder="Enter Team 2" />
        <button class="button" onclick="predict()">Predict Score</button>
        <div id="result"></div>
    </div>
    <script>
        async function predict() {
            const team1 = document.getElementById('team1').value;
            const team2 = document.getElementById('team2').value;

            const response = await fetch('https://api.example.com/odds'); // Replace with actual API endpoint
            const data = await response.json();

            let results = [];
            for (let i = 0; i < 100; i++) {
                const score1 = Math.floor(Math.random() * 5);
                const score2 = Math.floor(Math.random() * 5);
                results.push(`${team1} ${score1} - ${score2} ${team2}`);
            }

            const scoreCounts = {};
            results.forEach(score => {
                scoreCounts[score] = (scoreCounts[score] || 0) + 1;
            });

            const topScores = Object.entries(scoreCounts)
                .sort(([, a], [, b]) => b - a)
                .slice(0, 3);

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<h2>Top 3 Most Likely Scorelines:</h2>';  
            topScores.forEach(([score]) => {
                resultDiv.innerHTML += `<p>${score}</p>`;
            });
        }
    </script>
</body>
</html>
