<!DOCTYPE html>
<html>
<head>
  <title>West Ham Predictor</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #7a263a; /* West Ham claret */
      color: white;
    }

    .header {
      background: #1bb1e7; /* blue */
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 22px;
    }

    .container {
      padding: 20px;
      max-width: 400px;
      margin: auto;
    }

    .match {
      background: #5c1d2c;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .card {
      background: #3e1420;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .score {
      background: #1e2a47;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="header">
  ⚒️ WEST HAM MATCH PREDICTOR
</div>

<div class="container">

  <div id="matches">Loading fixtures...</div>
  <div id="result"></div>

</div>

<script>
const API_KEY = "YOUR_API_KEY"; // 🔴 PUT YOUR football-data key

// Load West Ham matches
async function loadMatches() {
  let res = await fetch(
    "https://corsproxy.io/?https://api.football-data.org/v4/teams/563/matches?status=SCHEDULED",
    {
      headers: { "X-Auth-Token": API_KEY }
    }
  );

  let data = await res.json();
  let matchesDiv = document.getElementById("matches");

  matchesDiv.innerHTML = "";

  data.matches.forEach(match => {
    let div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      ${match.homeTeam.name} vs ${match.awayTeam.name}
      <br><small>${new Date(match.utcDate).toLocaleString()}</small>
    `;

    div.onclick = () => simulate(match);

    matchesDiv.appendChild(div);
  });
}

// 100 simulation predictor
function simulate(match) {
  let results = {};

  for (let i = 0; i < 100; i++) {
    let homeGoals = Math.floor(Math.random() * 4);
    let awayGoals = Math.floor(Math.random() * 4);

    let score = homeGoals + "-" + awayGoals;
    results[score] = (results[score] || 0) + 1;
  }

  let sorted = Object.entries(results).sort((a,b) => b[1]-a[1]);

  let output = `<div class="card">
    <b>${match.homeTeam.name} vs ${match.awayTeam.name}</b>
    <br><br>Top Predictions:
  `;

  sorted.slice(0,3).forEach(([score,count]) => {
    output += `<div class="score">
      ${score} → ${count}/100
    </div>`;
  });

  output += "</div>";

  document.getElementById("result").innerHTML = output;
}

// load on start
loadMatches();
</script>

</body>
</html>
