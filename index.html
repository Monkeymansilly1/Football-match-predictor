<!DOCTYPE html>
<html>
<head>
  <title>West Ham Predictor</title>
  <style>
    body { margin:0; font-family:Arial; background:#7a263a; color:white; }
    .header { background:#1bb1e7; padding:15px; text-align:center; font-weight:bold; font-size:22px; }
    .container { padding:20px; max-width:400px; margin:auto; }
    .match { background:#5c1d2c; padding:12px; border-radius:10px; margin-bottom:10px; cursor:pointer; }
    .card { background:#3e1420; padding:15px; border-radius:12px; margin-top:20px; }
    .score { background:#1e2a47; padding:10px; margin-top:10px; border-radius:8px; }
    .form { margin-top:10px; font-weight:bold; }
  </style>
</head>
<body>

<div class="header">⚒️ WEST HAM MATCH PREDICTOR</div>
<div class="container">
  <div id="matches"></div>
  <div id="result"></div>
</div>

<script>
const fixtures = [
  { home: "West Ham", away: "Liverpool", date: "2026-04-12T15:00:00Z" },
  { home: "Chelsea", away: "West Ham", date: "2026-04-19T15:00:00Z" },
  { home: "West Ham", away: "Man City", date: "2026-04-26T15:00:00Z" },
  { home: "Arsenal", away: "West Ham", date: "2026-05-03T15:00:00Z" },
  { home: "West Ham", away: "Tottenham", date: "2026-05-10T15:00:00Z" },
];

const lastResults = {
  "West Ham": ["W","D","L","W","D"],
  "Liverpool": ["W","W","L","D","W"],
  "Chelsea": ["L","D","W","W","L"],
  "Man City": ["W","W","W","D","W"],
  "Arsenal": ["D","L","W","D","L"],
  "Tottenham": ["W","L","D","W","L"]
};

// Calculate team strength from last 5 results
function getStrength(team){
  let points = lastResults[team].reduce((acc,res)=>{
    if(res==="W") return acc+3;
    if(res==="D") return acc+1;
    return acc;
  },0);
  return 1 + points/10; // scale for simulation
}

// Generate goals biased towards realistic football scores
function generateGoals(strength){
  // Weighted random: 0-3 goals likely, 4-5 very rare
  const rand = Math.random() * strength;
  if(rand < 1) return 0;
  if(rand < 2) return 1;
  if(rand < 3) return 2;
  if(rand < 4) return 3;
  if(rand < 4.5) return 4;
  return 5;
}

// Display upcoming fixtures
function displayFixtures(){
  const container = document.getElementById("matches");
  container.innerHTML = "";
  fixtures.forEach(f=>{
    const div = document.createElement("div");
    div.className="match";
    div.innerHTML = `${f.home} vs ${f.away}<br><small>${new Date(f.date).toLocaleString()}</small>`;
    div.onclick = () => simulate(f);
    container.appendChild(div);
  });
}

// Simulate 500 matches with form and home advantage
function simulate(f){
  const results = {};
  const homeStrength = getStrength(f.home) + 0.3; // home advantage
  const awayStrength = getStrength(f.away);

  for(let i=0;i<500;i++){
    const hg = generateGoals(homeStrength);
    const ag = generateGoals(awayStrength);
    const score = `${hg}-${ag}`;
    results[score] = (results[score] || 0) + 1;
  }

  const sorted = Object.entries(results).sort((a,b)=>b[1]-a[1]);

  let output = `<div class="card">
    <b>${f.home} vs ${f.away}</b>
    <div class="form">Home Form: ${lastResults[f.home].join(" ")}</div>
    <div class="form">Away Form: ${lastResults[f.away].join(" ")}</div>
    <br><b>Top Predictions:</b>
  `;
  sorted.slice(0,3).forEach(([score,count])=>{
    output += `<div class="score">${score} → ${count}/500</div>`;
  });
  output += "</div>";

  document.getElementById("result").innerHTML = output;
}

displayFixtures();
</script>

</body>
</html>
